name: Build & Package Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Job 1 : Build Unity ( Ubuntu via Docker ) ───────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Unity Player
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: "6000.0.60f1"          # ← Remplace par ta version Unity
          targetPlatform: StandaloneWindows64
          buildName: MonJeu                  # ← Remplace par le nom de ton exe (sans .exe)
          buildsPath: build                 # ← Remplace si ton dossier de build est différent
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-build
          path: build/                      # ← Doit correspondre à buildsPath ci-dessus
          retention-days: 7

  # ─── Job 2 : Compile Inno Setup Installer ( Windows ) ────────────────────────
  installer:
    needs: build                           # ← Attend que le build soit prêt
    runs-on: windows-latest
    steps:
      - name: Download Unity Build
        uses: actions/download-artifact@v4
        with:
          name: unity-build
          path: ./build

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        # → Va compiler le script .iss avec ISCC.EXE ajouté au PATH par chocolatey
        run: iscc.exe installer.iss
        env:
          GAME_NAME: MonJeu                # ← Identique à buildName du job 1 (nom exe, sans .exe)
          GAME_VERSION: "1.0.0"           # ← Version du jeu (sera injectée dans le .iss via defines)
          GAME_EXE_PATH: build\MonJeu.exe  # ← Chemin de l'exe dans l'artifact

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: output/MonJeu-Setup.exe    # ← Doit correspondre au OutputBaseFilename dans .iss
          retention-days: 30
